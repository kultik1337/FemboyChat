<!doctype html>
<html lang="ru">
  <body style="margin:0;padding:0;background:#fff5fb;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;">
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background:#fff5fb;padding:32px 12px;">
      <tr>
        <td align="center">
          <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="max-width:480px;background:#ffffff;border-radius:24px;overflow:hidden;box-shadow:0 12px 40px rgba(255,122,184,0.18);">
            <tr>
              <td style="background:linear-gradient(135deg,#ff9ecd,#c9a3ff);padding:28px 32px;text-align:center;">
                <img src="https://femboychat.fun/icon.png" width="56" height="56" alt="FemboyChat" style="border-radius:14px;display:inline-block;" />
                <div style="color:#ffffff;font-size:22px;font-weight:800;margin-top:10px;letter-spacing:-0.3px;">FemboyChat &#127872;</div>
              </td>
            </tr>
            <tr>
              <td style="padding:32px;">
                <h1 style="margin:0 0 8px;font-size:22px;line-height:1.25;color:#2b1030;">Твоя ссылка для входа ✨</h1>
                <p style="margin:0 0 26px;font-size:15px;line-height:1.6;color:#6b5a72;">Нажми кнопку, чтобы войти в FemboyChat без пароля. Ссылка одноразовая и скоро истечёт.</p>
                <table role="presentation" cellpadding="0" cellspacing="0" style="margin:0 auto;">
                  <tr>
                    <td style="border-radius:999px;background:linear-gradient(135deg,#ff7ab8,#c9a3ff);">
                      <a href="{{ .ConfirmationURL }}" style="display:inline-block;padding:14px 36px;color:#ffffff;font-weight:800;font-size:15px;text-decoration:none;border-radius:999px;">Войти в FemboyChat</a>
                    </td>
                  </tr>
                </table>
                <p style="margin:26px 0 0;font-size:12px;line-height:1.5;color:#a695ad;">Если ты не запрашивал(а) вход — просто проигнорируй это письмо.</p>
              </td>
            </tr>
          </table>
          <div style="max-width:480px;margin:16px auto 0;text-align:center;font-size:12px;color:#b9a7c0;">Сделано с &#128150; для РУ-сообщества &middot; FemboyChat</div>
        </td>
      </tr>
    </table>
  </body>
</html>
