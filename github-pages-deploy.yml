# ──────────────────────────────────────────────────────────────
# FemboyChat — деплой на GitHub Pages.
#
# ⚠️ Чтобы этот workflow заработал, перемести файл по пути:
#        .github/workflows/deploy.yml
# (агент не смог создать его там автоматически — у токена не было
#  права на запись в .github/workflows).
#
# Затем: Settings → Pages → Build and deployment → Source: "GitHub Actions".
# После этого каждый пуш будет собирать и публиковать сайт на
#        https://kultik1337.github.io/FemboyChat/
# ──────────────────────────────────────────────────────────────
name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - 'claude/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install --no-audit --no-fund
      - run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
